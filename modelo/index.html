<!DOCTYPE html>
<html lang="pt-BR">
<head>

<body>
    <section class="container">
        <h1>Tabela IMC</h1>
          <div class="tabela">
        <div class="imc">
        <h2>IMC</h2>
        <p>Menos que 18,5</p>
        <p>Entre 18,5 e 24,9</p>
        <p>Entre 25 e 29,9</p>
        <p>Entre 30 e 34,9</p>
        <p>Entre 35 e 39,9</p>
        <p>Mais do que 40</p>
        </div>

        <div class="Resultado">
        <h2>Resultado</h2>
        <p>Abaixo do peso</p> 
        <p>Peso normal</p> 
        <p>Sobrepeso</p> 
        <p>Obesidade grau 1</p> 
        <p>Obesidade grau 2</p> 
        <p>Obesidade grau 3</p>
        </div>

  </div>
    <h2>Calcule Seu IMC</h2>
        <form action="" class="formulario">
            <label for="Peso">Peso</label>
            <input type="text" id="peso">

            <label for="altura">Altura</label>
            <input type="text" id="altura">

            <button class="calculo">Calcular</button>

            <p class="exibir"></p>
            <p></p>
        </form>
    </section>
